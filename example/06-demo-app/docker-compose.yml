services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: minidog
      POSTGRES_PASSWORD: minidog
      POSTGRES_DB: miniobserv
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minidog -d miniobserv"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: Dockerfile.server
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://minidog:minidog@timescaledb:5432/miniobserv?sslmode=disable"
      AGENT_TOKEN: "demo-secret-key-32chars-long!!"
      MIGRATIONS_PATH: "./migrations"
      LOG_LEVEL: "debug"
      DASHBOARD_ENABLED: "true"
      ALERT_RULES: '[{"host":"*","name":"cpu.usage_pct","op":">","threshold":5.0,"for":"30s"}]'
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    environment:
      SERVER_URL: "http://server:8080"
      AGENT_TOKEN: "demo-secret-key-32chars-long!!"
      COLLECT_INTERVAL: "5s"
      LOG_PATHS: "/var/log/demoapp/app.log"
      LOG_LEVEL: "debug"
    volumes:
      - demoapp_logs:/var/log/demoapp
    depends_on:
      server:
        condition: service_healthy

  demoapp:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "9000:9000"
    volumes:
      - demoapp_logs:/var/log/demoapp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  loadgen:
    build:
      context: .
      dockerfile: Dockerfile.loadgen
    environment:
      DEMO_URL: "http://demoapp:9000"
    depends_on:
      demoapp:
        condition: service_healthy

volumes:
  timescaledb_data:
  demoapp_logs:
