name: "💬 Feedback & Inspiration"
description: "Share your thoughts, what you learned, what you built inspired by this, or just say hi."
title: "[Feedback] "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        ## Hey, glad you're here 👋

        This project was built to be read, learned from, and hopefully inspire you to build something of your own.
        If it did — or if you have thoughts, questions, or just want to share — this is the place.

        **Learning to code or want to go deeper?** Come build with us at [Zeew Space](https://zeew.space) — where you learn by building real projects, get feedback from real people, and end up with a portfolio you're proud of. → **[zeew.space/discord](https://zeew.space/discord)**

  - type: textarea
    id: what-brought-you-here
    attributes:
      label: "What brought you here?"
      description: "Found this project via GitHub, a blog post, a friend? Just curious."
      placeholder: "I was looking for an example of a Go observability system / my friend showed me this / I was learning TimescaleDB..."
    validations:
      required: false

  - type: textarea
    id: thoughts
    attributes:
      label: "Your thoughts"
      description: "What did you think? What did you learn? What surprised you? What would you do differently?"
      placeholder: "I didn't know CPU% was calculated from deltas. I tried the same pattern for my own metrics collector and it worked..."
    validations:
      required: true

  - type: textarea
    id: built-something
    attributes:
      label: "Did you build something inspired by this?"
      description: "If this project sparked an idea and you built something — even a small experiment — share it. We'd love to see it."
      placeholder: "I built a similar thing but for tracking API latency... / I used the statFn injection pattern in my own project..."
    validations:
      required: false

  - type: dropdown
    id: experience
    attributes:
      label: "Your programming experience"
      description: "Just so we know how to read your feedback."
      options:
        - "Just starting out"
        - "Some experience (< 2 years)"
        - "Intermediate (2–5 years)"
        - "Senior / experienced"
    validations:
      required: false

  - type: checkboxes
    id: community
    attributes:
      label: "Want to keep learning?"
      options:
        - label: "I'd like to join the Zeew Space community — [zeew.space/discord](https://zeew.space/discord)"
