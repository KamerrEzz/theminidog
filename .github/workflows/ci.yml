name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Test
        run: go test ./... -count=1 -timeout 60s

      - name: Build
        run: |
          go build ./cmd/agent
          go build ./cmd/server
